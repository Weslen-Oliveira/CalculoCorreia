<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cálculo Linear</title>
</head>
<body>
    <div class="divModal" id="divModal">
        <div class="modal" id="modal">
            <h1 class="tituloModal" id="tituloModal">Metragem Linear</h1>
            <!-- <h3 class="mtsLinear" id="mtsLinear">Metragem Linear</h3> -->
            <h3 class="resp" id="resp"></h3>
            <button type="reset" class="btnFecharModal" id="btnFecharModal">X</button>
        </div>
    </div>
    <div class="divfrm">
        <form class="frm" id="frm">
            <nav class="divIcon" id="divIcon">
                <img src="/img/Group 2.svg" alt="">
            </nav>
            <h1>Cálculo Linear</h1>
            <h4>Digite os valores em Milímetros</h4>
            <div class="divInput">
                <div class="inputBox">
                    <input type="number" class="largura" id="Dmenor" name="Dmenor" required>
                    <label for="Dmenor">Diâmetro Menor</label>
                </div>

                <div class="inputBox">
                    <input type="number" class="largura" id="Dmaior" name="Dmaior" required>
                    <label for="Dmaior">Diâmetro Maior</label>
                </div>

                <div class="inputBox">
                    <input type="number" class="largura" id="Nvoltas" name="Nvoltas" required>
                    <label for="Nvoltas">Número de Voltas</label>
                </div>
                <button type="button" class="btnCalcular" id="btnCalcular">Calcular</button>
            </div>
            <footer class="rodape" id="rodape">
                <p>&copy; 2023 Cálculo Linear. Todos os direitos reservados.</p>    
                <p>Criado por: <span class="nome">Weslen.O.Santos</span></p>
            </footer>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
